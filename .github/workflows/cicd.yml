name: BinLingo CI/CD

on:
  push:
    branches: [master, main]
    paths-ignore:
      - "README.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bilingnus:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/bilingnus:latest
          cache-to: type=inline
          build-args: |
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            FIREBASE_CLIENT_EMAIL=${{ secrets.FIREBASE_CLIENT_EMAIL }}
            FIREBASE_PRIVATE_KEY=${{ secrets.FIREBASE_PRIVATE_KEY }}

  deploy:
    needs: build
    runs-on: self-hosted
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create .env.production from GitHub Secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os

          lines = [
            "NODE_ENV=production",
            f"DATABASE_URL={os.environ['DATABASE_URL']}",
            f"DIRECT_URL={os.environ['DIRECT_URL']}",
            f"NEXT_PUBLIC_FIREBASE_API_KEY={os.environ['NEXT_PUBLIC_FIREBASE_API_KEY']}",
            f"NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN={os.environ['NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN']}",
            f"NEXT_PUBLIC_FIREBASE_PROJECT_ID={os.environ['NEXT_PUBLIC_FIREBASE_PROJECT_ID']}",
            f"NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET={os.environ['NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET']}",
            f"NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID={os.environ['NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID']}",
            f"NEXT_PUBLIC_FIREBASE_APP_ID={os.environ['NEXT_PUBLIC_FIREBASE_APP_ID']}",
            f"NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID={os.environ['NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID']}",
            f"FIREBASE_PROJECT_ID={os.environ['FIREBASE_PROJECT_ID']}",
            f"FIREBASE_CLIENT_EMAIL={os.environ['FIREBASE_CLIENT_EMAIL']}",
            f"FIREBASE_PRIVATE_KEY={os.environ['FIREBASE_PRIVATE_KEY']}",
            f"STRIPE_SECRET_KEY={os.environ['STRIPE_SECRET_KEY']}",
            f"STRIPE_WEBHOOK_SECRET={os.environ['STRIPE_WEBHOOK_SECRET']}",
            f"NEXT_PUBLIC_APP_URL={os.environ['NEXT_PUBLIC_APP_URL']}",
            f"GEMINI_API_KEY={os.environ['GEMINI_API_KEY']}",
          ]
          open('.env.production', 'w').write('\n'.join(lines) + '\n')
          print('env file created')
          PYEOF 

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull Latest Image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/bilingnus:latest

      - name: Deploy BinLingo
        run: |
          docker compose pull web
          docker compose up -d --no-deps web

      - name: Remove temporary env file
        if: always()
        run: rm -f .env.production

      - name: Cleanup dangling images
        run: docker image prune -f